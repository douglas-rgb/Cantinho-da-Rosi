<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Crochê</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Estilo básico para o Modal de Pagamento */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
        }
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            border-radius: 10px;
            text-align: center;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .btn-pagar {
            background-color: #009ee3;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header class="header">
  <div class="logo"><h1>Modelos</h1></div>
  <nav id="nav">
    <ul class="nav-list">
      <li><a href="/">Home</a></li>
      <li><a href="#produtos">Produtos</a></li>
      <li><a href="#contato">Contato</a></li>
    </ul>
  </nav>
</header>

<section id="produtos" class="produtos">
  <h1>Nossos Produtos</h1>
  <div class="grid-produtos">
    <!-- Exemplo de card -->
    <div class="card">
      <img src="img/Trilho de mesa.webp">
      <h3>Centro de Mesa</h3>
      <p class="preco">R$ 1,00</p>
      <button class="btn-comprar" data-produto="Centro de Mesa" data-preco="1.00">
        Comprar
      </button>
    </div>
    <!-- Repita os outros cards aqui mantendo os data-attributes -->
  </div>
</section>

<!-- MODAL DE PAGAMENTO (O QUE ESTAVA FALTANDO) -->
<div id="modalPagamento" class="modal">
    <div class="modal-content">
        <h3>Finalizar Pagamento</h3>
        <p id="nomeProdutoModal"></p>
        <p><strong>Total: R$ <span id="valorProdutoModal"></span></strong></p>
        
        <input type="text" id="pagadorNome" placeholder="Seu Nome" required>
        <input type="text" id="pagadorSobrenome" placeholder="Seu Sobrenome">
        <input type="email" id="pagadorEmail" placeholder="Seu E-mail" required>
        <input type="text" id="pagadorCPF" placeholder="Seu CPF (apenas números)" required>
        
        <button id="btnGerarPix" class="btn-pagar">Gerar PIX</button>
        <button onclick="document.getElementById('modalPagamento').style.display='none'" style="margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">Cancelar</button>
    </div>
</div>

<!-- Scripts -->
<script src="scripts.js"></script>

</body>
</html>
